<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart Billing Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="top-bar">
        <h1>Mart Billing Page (Admin)</h1>
        <div class="top-actions">
            <button id="adminLogoutBtn">Log Out</button>
        </div>
    </header>

    <section class="billing-form-section">
        <h2>Billing Input</h2>
        <form id="billForm" class="inline-form">
            <input type="text" id="item" placeholder="Item" required>
            <input type="number" id="quantity" placeholder="Quantity" min="1" required>
            <input type="number" id="price" placeholder="Price" min="0" step="0.01" required>
            <input type="text" id="clientName" placeholder="Client Name" required>
            <button type="submit">Add to Bill</button>
            <button type="button" id="resetBtn">Reset</button>
        </form>
    </section>

    <section class="table-wrap">
        <h2>Bill Table</h2>
        <table id="billTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Client Name</th>
                    <th>Line Total</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div class="bill-footer">
            <h3>Total: <span id="grandTotal">0.00</span></h3>
            <button id="printBtn">Print</button>
        </div>
    </section>

    <script src="{{ url_for('static', filename='billing.js') }}"></script>
</body>
</html>
